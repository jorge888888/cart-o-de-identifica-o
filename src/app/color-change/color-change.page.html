<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Color Change</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [style.--background]="corFundo">
  <ion-grid>
    <ion-row>
      <ion-col size="1"><ion-label color="danger">R</ion-label></ion-col>
      <ion-col>
        <ion-range [min]="0" [max]="255" [(ngModel)]="r"></ion-range>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="1"><ion-label color="success">G</ion-label></ion-col>
      <ion-col>
        <ion-range [min]="0" [max]="255" [(ngModel)]="g"></ion-range>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="1"><ion-label color="primary">B</ion-label></ion-col>
      <ion-col>
        <ion-range [min]="0" [max]="255" [(ngModel)]="b"></ion-range>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-button expand="block" [style.--background]="corBotao" (click)="mudarCorBotao()">
     1
  </ion-button>

  <ion-button expand="block" (click)="mudarCorFundo()">
     2
  </ion-button>

</ion-content>
